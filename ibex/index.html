<!DOCTYPE html>

  <head>
    <!-- Google tag (gtag.js) - Deferred for performance -->
    <script>
      let gtmLoaded = false;
      function loadGTM() {
        if (gtmLoaded) return;
        gtmLoaded = true;
        const script = document.createElement('script');
        script.async = true;
        script.src = "https://www.googletagmanager.com/gtag/js?id=G-2VWRLK7PF6";
        document.head.appendChild(script);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-2VWRLK7PF6');
        ['scroll', 'mousemove', 'touchstart', 'keydown'].forEach(evt => window.removeEventListener(evt, loadGTM));
      }
      ['scroll', 'mousemove', 'touchstart', 'keydown'].forEach(evt => window.addEventListener(evt, loadGTM, {once: true, passive: true}));
      setTimeout(loadGTM, 3500); // Fallback if no interaction
    </script>
